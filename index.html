<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SYLVAI</title>

<style>
body {
  margin:0;
  font-family: Helvetica, Arial;
  background:#0f1a14;
  color:white;
  padding:20px;
}
.card {
  background:#16241c;
  padding:15px;
  border-radius:12px;
  margin-top:15px;
}
input, button, select {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:8px;
  border:none;
}
button {
  background:#2e7d32;
  color:white;
  font-weight:bold;
}
img {
  width:100%;
  border-radius:10px;
}
</style>
</head>

<body>

<h2>SYLVAI 🌿</h2>
<div id="app"></div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyPVe2V0cknwxBl5__jawo_tkn_5fOys6l3R2ivUcZsJRTPKOX94ee7efLilJJRmgwp/exec";

// ---------------- USER ----------------
let userId = localStorage.getItem("user_id");
if (!userId) {
  userId = "U" + Math.random().toString(36).substr(2,9);
  localStorage.setItem("user_id", userId);
}

let profile = {};
let cart = [];
let step = "profile";

// ---------------- PLANTS ----------------
const PLANTS = [
  {
    name:"Snake Plant",
    price:650,
    lux_min:50,
    lux_max:1500,
    benefit:"Sleep + Oxygen",
    co2:2.5,
    image:"https://images.unsplash.com/photo-1599598425947-330026292ad0"
  },
  {
    name:"Pothos",
    price:350,
    lux_min:100,
    lux_max:1200,
    benefit:"Focus + VOC removal",
    co2:1.8,
    image:"https://images.unsplash.com/photo-1614594851134-8b0f8b3e1c1c"
  },
  {
    name:"Peace Lily",
    price:850,
    lux_min:100,
    lux_max:800,
    benefit:"Respiratory + humidity",
    co2:3.2,
    image:"https://images.unsplash.com/photo-1593696954577-ab3d39317b97"
  }
];

// ---------------- ENV ----------------
let env = {
  lux:300,
  humidity:40,
  occupancy:2,
  ventilation:"Medium"
};

// ---------------- SYNC ----------------
function sync(type,data){
  fetch(SCRIPT_URL,{
    method:"POST",
    mode:"no-cors",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      type,
      data:{user_id:userId,...data}
    })
  });
}

// ---------------- ENGINE ----------------
function scorePlant(p){
  let score = 0;

  if(env.lux >= p.lux_min && env.lux <= p.lux_max) score += 50;

  let co2 = (env.occupancy*2) - (env.ventilation==="High"?2:1);
  if(p.co2 > 2 && co2 > 2) score += 30;

  return score;
}

// ---------------- RENDER ----------------
function render(){
  const app = document.getElementById("app");

  if(step==="profile"){
    app.innerHTML = `
      <div class="card">
        <h3>Your Details</h3>
        <input id="name" placeholder="Name">
        <input id="phone" placeholder="Phone">
        <input id="email" placeholder="Email">
        <button onclick="saveProfile()">Continue</button>
      </div>
    `;
  }

  if(step==="scan"){
    app.innerHTML = `
      <div class="card">
        <h3>Environment</h3>

        Lux: ${env.lux}
        <input type="range" min="50" max="1500" value="${env.lux}" onchange="env.lux=this.value">

        Humidity: ${env.humidity}
        <input type="range" min="20" max="80" value="${env.humidity}" onchange="env.humidity=this.value">

        Occupancy
        <input type="number" value="${env.occupancy}" onchange="env.occupancy=this.value">

        Ventilation
        <select onchange="env.ventilation=this.value">
          <option>Low</option>
          <option selected>Medium</option>
          <option>High</option>
        </select>

        <button onclick="runScan()">Analyze</button>
      </div>
    `;
  }

  if(step==="shop"){
    let rec = PLANTS.map(p => ({...p, score:scorePlant(p)}))
                    .sort((a,b)=>b.score-a.score);

    app.innerHTML = `
      <div class="card">
        <h3>Recommended Plants</h3>
        ${rec.map(p=>`
          <div style="margin-top:20px">
            <img src="${p.image}">
            <b>${p.name}</b><br>
            ${p.benefit}<br>
            Score: ${p.score}%<br>
            ₹${p.price}
            <button onclick="addToCart('${p.name}')">Add</button>
          </div>
        `).join("")}
      </div>

      <div class="card">
        Cart: ${cart.length}
        <button onclick="checkout()">Checkout</button>
      </div>
    `;
  }
}

// ---------------- ACTIONS ----------------
function saveProfile(){
  profile = {
    name:document.getElementById("name").value,
    phone:document.getElementById("phone").value,
    email:document.getElementById("email").value
  };

  sync("User_Init",{profile});

  step="scan";
  render();
}

function runScan(){
  sync("Scan_Data",env);
  step="shop";
  render();
}

function addToCart(name){
  const plant = PLANTS.find(p=>p.name===name);
  cart.push(plant);

  sync("Add_To_Cart",{plant:name});

  render();
}

function checkout(){
  sync("Order",{
    user:profile,
    items:cart.map(c=>c.name),
    total:cart.reduce((s,p)=>s+p.price,0)
  });

  alert("Order placed");

  cart=[];
  step="profile";
  render();
}

render();
</script>

</body>
</html>
