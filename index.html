<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SYLVAI</title>

<style>
body {
  margin:0;
  font-family: Helvetica, Arial;
  background:#0f1a14;
  color:#e6efe9;
}
.container {
  max-width:420px;
  margin:auto;
  padding:16px;
}
.card {
  background:#16241c;
  padding:16px;
  border-radius:16px;
  margin-top:16px;
}
button {
  width:100%;
  padding:14px;
  margin-top:10px;
  border:none;
  border-radius:12px;
  background:#2e7d32;
  color:white;
  font-weight:bold;
}
input {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:none;
}
img {
  width:100%;
  border-radius:12px;
}
</style>
</head>

<body>

<div class="container">
<h2>SYLVAI 🌿</h2>
<div id="app"></div>
</div>

<script>
// ================== DATABASE ==================
const PLANTS = [
{
name:"Snake Plant",
price:650,
lux_min:50,
lux_max:1500,
benefit:"Sleep Optimization",
water:14,
image:"https://images.unsplash.com/photo-1599598425947-330026292ad0"
},
{
name:"Pothos",
price:350,
lux_min:100,
lux_max:1200,
benefit:"Focus Boost",
water:7,
image:"https://images.unsplash.com/photo-1614594851134-8b0f8b3e1c1c"
}
];

// ================== STATE ==================
let step="profile";
let profile={};
let cart=[];
let env={lux:300};

// ================== APPSCRIPT ==================
const SCRIPT_URL="https://script.google.com/macros/s/AKfycbyPVe2V0cknwxBl5__jawo_tkn_5fOys6l3R2ivUcZsJRTPKOX94ee7efLilJJRmgwp/exec";

function sync(type,data){
fetch(SCRIPT_URL,{
method:"POST",
headers:{"Content-Type":"text/plain"},
body:JSON.stringify({type,data})
});
}

// ================== ENGINE ==================
function score(p){
return (env.lux>=p.lux_min && env.lux<=p.lux_max)?80:40;
}

// ================== UI ==================
function render(){
let app=document.getElementById("app");

if(step==="profile"){
app.innerHTML=`
<div class="card">
<h3>Enter Details</h3>
<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="email" placeholder="Email">
<button onclick="saveProfile()">Continue</button>
</div>`;
}

if(step==="scan"){
app.innerHTML=`
<div class="card">
<h3>Light: ${env.lux}</h3>
<input type="range" min="50" max="1500" value="${env.lux}" onchange="env.lux=this.value">
<button onclick="analyze()">Analyze</button>
</div>`;
}

if(step==="shop"){
app.innerHTML=`
<div class="card">
<h3>Recommended</h3>
${PLANTS.map(p=>`
<div>
<img src="${p.image}">
<b>${p.name}</b><br>
${p.benefit}<br>
Score: ${score(p)}<br>
<button onclick="add('${p.name}')">Add</button>
</div>`).join("")}
</div>

<div class="card">
Cart: ${cart.length}
<button onclick="checkout()">Checkout</button>
</div>`;
}
}

// ================== ACTIONS ==================
function saveProfile(){
profile={
name:document.getElementById("name").value,
phone:document.getElementById("phone").value,
email:document.getElementById("email").value
};

sync("User",{profile});
step="scan";
render();
}

function analyze(){
sync("Scan",{env});
step="shop";
render();
}

function add(name){
let p=PLANTS.find(x=>x.name===name);
cart.push(p);
render();
}

function checkout(){
sync("Order",{profile,cart});
alert("Order placed");
cart=[];
step="profile";
render();
}

render();
</script>

</body>
</html>
