<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SYLVAI</title>

<style>
body {
  margin:0;
  font-family: Helvetica, Arial;
  background:#0f1a14;
  color:white;
}
.container {
  max-width:420px;
  margin:auto;
  padding:16px;
}
.card {
  background:#16241c;
  padding:16px;
  border-radius:16px;
  margin-top:16px;
}
button {
  width:100%;
  padding:14px;
  margin-top:10px;
  border:none;
  border-radius:12px;
  background:#2e7d32;
  color:white;
  font-weight:bold;
}
input, select {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:none;
}
img {
  width:100%;
  border-radius:12px;
  margin-top:10px;
}
.small {
  font-size:12px;
  color:#aaa;
}
.tag {
  font-size:10px;
  color:#4ade80;
}
</style>
</head>

<body>

<div class="container">
<h2>SYLVAI 🌿</h2>
<div id="app"></div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyPVe2V0cknwxBl5__jawo_tkn_5fOys6l3R2ivUcZsJRTPKOX94ee7efLilJJRmgwp/exec";

// ---------------- USER ----------------
let userId = localStorage.getItem("user_id") || ("U"+Math.random().toString(36).substr(2,9));
localStorage.setItem("user_id", userId);

let profile = {};
let cart = [];
let plantsOwned = [];
let step = "profile";

// ---------------- ENV ----------------
let env = {
  lux:300,
  humidity:40,
  occupancy:2,
  ventilation:"Medium"
};

// ---------------- PLANT DB ----------------
const PLANTS = [
{
name:"Snake Plant",
price:650,
lux_min:50,
lux_max:1500,
co2:2.5,
care:14,
benefit:"Sleep + Oxygen",
image:"https://upload.wikimedia.org/wikipedia/commons/thumb/2/2d/Sansevieria_trifasciata.jpg/800px-Sansevieria_trifasciata.jpg"
},
{
name:"Pothos",
price:350,
lux_min:100,
lux_max:1200,
co2:1.8,
care:7,
benefit:"Focus + VOC removal",
image:"https://upload.wikimedia.org/wikipedia/commons/thumb/6/6e/Epipremnum_aureum.jpg/800px-Epipremnum_aureum.jpg"
},
{
name:"Peace Lily",
price:850,
lux_min:100,
lux_max:800,
co2:3.2,
care:5,
benefit:"Respiratory + humidity",
image:"https://upload.wikimedia.org/wikipedia/commons/thumb/2/27/Spathiphyllum_cochlearispathum_RTBG.jpg/800px-Spathiphyllum_cochlearispathum_RTBG.jpg"
}
];

// ---------------- SYNC ----------------
async function sync(type,data){
  try{
    await fetch(SCRIPT_URL,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        type:type,
        data:{user_id:userId,...data}
      })
    });
    console.log("SYNC:",type,data);
  }catch(e){
    console.log("Sync failed",e);
  }
}

// ---------------- ENGINE ----------------
function scorePlant(p){
  let score=0;

  if(env.lux>=p.lux_min && env.lux<=p.lux_max) score+=50;

  let co2=(env.occupancy*2)-(env.ventilation==="High"?2:1);
  if(p.co2>2 && co2>2) score+=30;

  return score;
}

function wateringDays(p){
  let factor=env.lux>800?0.8:1.2;
  return Math.round(p.care*factor);
}

// ---------------- RENDER ----------------
function render(){
let app=document.getElementById("app");

// PROFILE
if(step==="profile"){
app.innerHTML=`
<div class="card">
<h3>Enter Details</h3>
<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="email" placeholder="Email">
<button onclick="saveProfile()">Continue</button>
</div>`;
}

// SCAN
if(step==="scan"){
app.innerHTML=`
<div class="card">
<h3>Environment Scan</h3>

Lux ${env.lux}
<input type="range" min="50" max="1500" value="${env.lux}" onchange="env.lux=this.value">

Humidity ${env.humidity}
<input type="range" min="20" max="80" value="${env.humidity}" onchange="env.humidity=this.value">

Occupancy
<input type="number" value="${env.occupancy}" onchange="env.occupancy=this.value">

<select onchange="env.ventilation=this.value">
<option>Low</option>
<option selected>Medium</option>
<option>High</option>
</select>

<button onclick="runScan()">Analyze</button>
</div>`;
}

// SHOP
if(step==="shop"){
let rec=PLANTS.map(p=>({...p,score:scorePlant(p)})).sort((a,b)=>b.score-a.score);

app.innerHTML=`
<div class="card">
<h3>Recommended</h3>

${rec.map(p=>`
<div>
<img src="${p.image}">
<b>${p.name}</b>
<div class="tag">${p.benefit}</div>
<div class="small">Score: ${p.score}%</div>
<div class="small">Water: every ${wateringDays(p)} days</div>
₹${p.price}
<button onclick="addToCart('${p.name}')">Add</button>
</div>
`).join("")}

</div>

<div class="card">
Cart: ${cart.length}
<button onclick="goCheckout()">Checkout</button>
</div>`;
}

// CHECKOUT
if(step==="checkout"){
let total=cart.reduce((s,p)=>s+p.price,0);

app.innerHTML=`
<div class="card">
<h3>Checkout</h3>

${cart.map(c=>`<div>${c.name} - ₹${c.price}</div>`).join("")}

<hr>
<b>Total: ₹${total}</b>

<button onclick="checkout()">Confirm</button>
</div>`;
}

// DASHBOARD
if(step==="dashboard"){
app.innerHTML=`
<div class="card">
<h3>Your Plants</h3>

${plantsOwned.length===0?"No plants yet":plantsOwned.map(p=>`
<div>
<img src="${p.image}">
<b>${p.name}</b>
<div class="small">Water in ${p.nextWater} days</div>
</div>
`).join("")}
</div>

<button onclick="step='scan';render()">Add More</button>
`;
}
}

// ---------------- ACTIONS ----------------
function saveProfile(){
profile={
name:document.getElementById("name").value,
phone:document.getElementById("phone").value,
email:document.getElementById("email").value
};

sync("User_Init",{profile});
step="scan";
render();
}

function runScan(){
sync("Scan",{env});
step="shop";
render();
}

function addToCart(name){
let p=PLANTS.find(x=>x.name===name);
cart.push(p);

sync("Add",{plant:name});
render();
}

function goCheckout(){
step="checkout";
render();
}

function checkout(){
plantsOwned=cart.map(p=>({
...p,
nextWater:wateringDays(p)
}));

sync("Order",{
user:profile,
items:cart.map(c=>c.name)
});

alert("Order placed");

cart=[];
step="dashboard";
render();

// REMINDER (basic)
setTimeout(()=>{
alert("Reminder: Water your plants today 🌿");
},5000);
}

// INIT
render();
</script>

</body>
</html>
